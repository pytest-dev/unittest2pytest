name: CI

on:
  push:
    branches:
      - main
      - "test-me-*"
    tags:
      - "v*"

  pull_request:
    branches:
      - "*"

env:
  FORCE_COLOR: 1

# Cancel running jobs for the same workflow and branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check changelog (tagged release)
        if: github.ref_type == 'tag'
        run: python check_changelog.py --tag "${{ github.ref_name }}"

      - name: Check changelog (PR has new entries)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          python check_changelog.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Check Package
        uses: hynek/build-and-inspect-python-package@v2.14

  test:
    needs: [package]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
        os: [ubuntu-latest, macos-latest]  # , windows-latest]  # Windows tests will fail.

    steps:
      - uses: actions/checkout@v6

      - name: Download Package
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade tox

      - name: Test
        shell: bash
        run: |
          tox run -e py --installpkg `find dist/*.tar.gz`

  pypi-publish:
    if: github.ref_type == 'tag'
    needs: [changelog, package, test]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - name: Download Package
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          attestations: true

  github-release:
    if: github.ref_type == 'tag'
    needs: [pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Package
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes dist/*
